name: Apply Warm Bistro Colors

on:
  push:
    paths:
      - .github/workflows/apply-warm-bistro-colors.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-colors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update index CSS colors
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          content = path.read_text(encoding='utf-8')

          replacements = [
              ('''    --cream:#FBF3E6;
    --cream-soft:#FDF8F0;
    --sage:#8AA17E;
    --sage-dark:#6F8A63;
    --coffee:#7A5C43;
    --coffee-dark:#5A4230;
    --text-dark:#4A3B2F;
    --text-light:#8A7C6E;
    --white:#FFFFFF;
    --shadow:rgba(74,59,47,0.15);
    --accent:#E8A566;''', '''    --cream:#EDE2D0;
    --cream-soft:#FFF9EF;
    --sage:#7F946B;
    --sage-dark:#6F835C;
    --coffee:#6B4A35;
    --coffee-dark:#3F2D22;
    --text-dark:#4B3A2F;
    --text-light:#7B6B5D;
    --white:#FFF9EF;
    --border:#D6C2A8;
    --steps-bg:#E6EBD8;
    --ingredients-bg:#F3E4D2;
    --why-bg:#F7DFAE;
    --shadow:rgba(63,45,34,0.18);
    --accent:#E8A566;'''),
              ('      linear-gradient(160deg, #FBF3E6 0%, #F6EFE1 40%, #EAF1E3 100%);', '      linear-gradient(160deg, #EDE2D0 0%, #E8D9C3 52%, #E6EBD8 100%);'),
              ('    background:var(--white);\n    padding:6px 16px;', '    background:var(--white);\n    border:1px solid var(--border);\n    padding:6px 16px;'),
              ('    background:var(--white);\n    border-radius:24px;', '    background:var(--white);\n    border:1px solid var(--border);\n    border-radius:24px;'),
              ('    box-shadow:0 10px 30px var(--shadow);', '    box-shadow:0 14px 34px rgba(63,45,34,0.16);'),
              ('    background:var(--cream-soft);\n    border:2px solid transparent;', '    background:#F6EAD9;\n    border:2px solid var(--border);'),
              ('    background:#F3E9D8;', '    background:#F3E4D2;'),
              ('    box-shadow:0 6px 14px rgba(138,161,126,0.45);', '    box-shadow:0 6px 14px rgba(127,148,107,0.45);'),
              ('    background:linear-gradient(135deg, var(--coffee) 0%, var(--coffee-dark) 100%);', '    background:var(--coffee);'),
              ('    box-shadow:0 10px 20px rgba(122,92,67,0.35);', '    box-shadow:0 10px 20px rgba(107,74,53,0.34);'),
              ('    box-shadow:0 14px 24px rgba(122,92,67,0.4);', '    box-shadow:0 14px 24px rgba(107,74,53,0.42);'),
              ('    background:rgba(122,92,67,0.18);', '    background:var(--border);'),
              ('    background:#FFF7EC;', '    background:var(--cream-soft);'),
              ('    border:2px dashed rgba(122,92,67,0.18);', '    border:2px dashed var(--border);'),
              ('    border:2px solid rgba(122,92,67,0.1);', '    border:2px solid var(--border);'),
              ('    background:var(--white);\n    border-radius:26px;\n    overflow:hidden;', '    background:var(--white);\n    border:1px solid var(--border);\n    border-radius:26px;\n    overflow:hidden;'),
              ('    box-shadow:0 18px 40px var(--shadow);', '    box-shadow:0 22px 46px rgba(63,45,34,0.2);'),
              ('    padding:22px 24px 26px 18px;\n    background:var(--cream-soft);', '    padding:22px 24px 26px 18px;\n    background:var(--steps-bg);'),
              ('    background:var(--cream-soft);\n    border-radius:14px;', '    background:var(--ingredients-bg);\n    border:1px solid var(--border);\n    border-radius:14px;'),
              ('    background:var(--white);\n    border-left:4px solid var(--sage);\n    box-shadow:0 4px 12px rgba(74,59,47,0.08);', '    background:var(--why-bg);\n    border-left:4px solid var(--sage);\n    border-top:1px solid var(--border);\n    border-right:1px solid var(--border);\n    border-bottom:1px solid var(--border);\n    box-shadow:0 5px 14px rgba(63,45,34,0.12);'),
              ('    border-bottom:2px dashed rgba(122,92,67,0.2);', '    border-bottom:2px dashed var(--border);'),
              ('    box-shadow:0 2px 6px rgba(111,138,99,0.4);', '    box-shadow:0 2px 6px rgba(127,148,107,0.42);'),
              ('    background:var(--white);\n    border-radius:22px;', '    background:var(--white);\n    border:1px solid var(--border);\n    border-radius:22px;'),
              ('    box-shadow:0 10px 24px var(--shadow);', '    box-shadow:0 14px 30px rgba(63,45,34,0.16);'),
              ('      background:var(--cream-soft);\n      border-top:2px dashed rgba(122,92,67,0.2);', '      background:var(--steps-bg);\n      border-top:2px dashed var(--border);'),
          ]

          missing = []
          for old, new in replacements:
              if old not in content:
                  missing.append(old.split('\n', 1)[0].strip())
              content = content.replace(old, new)

          if missing:
              raise SystemExit('Missing expected CSS snippets: ' + '; '.join(missing))

          required = ['#EDE2D0', '#FFF9EF', '#3F2D22', '#4B3A2F', '#6B4A35', '#7F946B', '#E6EBD8', '#F3E4D2', '#F7DFAE', '#D6C2A8']
          absent = [color for color in required if color not in content]
          if absent:
              raise SystemExit('Missing required colors after update: ' + ', '.join(absent))

          path.write_text(content, encoding='utf-8')
          PY
      - name: Commit index update and remove this workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-warm-bistro-colors.yml
          git add index.html
          git commit -m "style: update recipe card warm bistro colors"
          git push
